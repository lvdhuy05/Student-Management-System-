{% extends "base.html" %}
{% block title %}Tao lop hoc phan | SMS{% endblock %}

{% block content %}
<section class="card">
  <div class="card-head">
    <h2>Tao lop hoc phan</h2>
    <a class="btn ghost" href="{% url 'students:classroom_list' %}">Ve danh sach lop HP</a>
  </div>

  <form method="post" class="grid-form grid-2">
    {% csrf_token %}
    {% for field in form %}
      <label>
        {{ field.label }}
        {{ field }}
        {% if field.errors %}
          <small class="error-text">{{ field.errors|join:", " }}</small>
        {% endif %}
      </label>
    {% endfor %}

    <div class="form-actions">
      <button type="submit" class="btn primary">Luu lop hoc phan</button>
      <a class="btn ghost" href="{% url 'students:classroom_list' %}">Huy</a>
    </div>
  </form>
</section>
{% endblock %}
