{% extends "base.html" %}
{% block title %}Dang ky hoc phan (quan tri) | SMS{% endblock %}

{% block content %}
<section class="card">
  <div class="card-head">
    <h2>Tao dang ky hoc phan cho sinh vien</h2>
  </div>

  <form method="post" class="grid-form grid-2">
    {% csrf_token %}
    {% for field in form %}
      <label>
        {{ field.label }}
        {{ field }}
        {% if field.errors %}
          <small class="error-text">{{ field.errors|join:", " }}</small>
        {% endif %}
      </label>
    {% endfor %}
    <div class="form-actions">
      <button class="btn primary" type="submit">Luu dang ky</button>
      <a class="btn ghost" href="{% url 'students:dashboard' %}">Huy</a>
    </div>
  </form>
</section>
{% endblock %}
