{% extends "base.html" %}
{% block title %}Dang nhap | SMS{% endblock %}

{% block content %}
<section class="card login-card">
  <h2>Dang nhap he thong</h2>
  <p class="muted">Su dung tai khoan da duoc cap role de truy cap dung chuc nang.</p>

  <form method="post" class="grid-form">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="message error">{{ form.non_field_errors|join:", " }}</div>
    {% endif %}

    <label>
      Ten dang nhap
      <input type="text" name="username" autofocus required>
    </label>

    <label>
      Mat khau
      <div class="password-field">
        <input id="password-input" type="password" name="password" required>
        <button
          id="toggle-password-btn"
          class="btn ghost toggle-password"
          type="button"
          aria-pressed="false"
          aria-controls="password-input"
        >
          Hien
        </button>
      </div>
    </label>

    <button type="submit" class="btn primary">Dang nhap</button>
  </form>
</section>

<script>
  (function () {
    const passwordInput = document.getElementById("password-input");
    const toggleBtn = document.getElementById("toggle-password-btn");
    if (!passwordInput || !toggleBtn) return;

    toggleBtn.addEventListener("click", function () {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      toggleBtn.textContent = isHidden ? "An" : "Hien";
      toggleBtn.setAttribute("aria-pressed", String(isHidden));
    });
  })();
</script>
{% endblock %}
